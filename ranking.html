<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking dos Campeões</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cs-video-shell">
    <video class="cs-bg-video" autoplay muted loop playsinline>
      <source src="cs2_header.webm" type="video/webm">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <div class="app-shell app-shell-compact">
    <header class="top-nav glass compact-top-nav">
      <div class="brand-lockup compact-brand">
        <div class="brand-mark logo-mark"><img src="logo.png" alt="CS dos Campeões" class="brand-logo-image"></div>
        <div class="brand-texts">
          <strong class="brand-title">Ranking</strong>
          <span class="brand-subtitle">Pontuação global da galera</span>
        </div>
      </div>
      <div class="top-nav-actions compact-nav-actions">
        <a class="nav-link" href="index.html">Voltar</a>
      </div>
    </header>

    <section class="panel glass compact-panel">
      <div class="panel-header compact-panel-header">
        <div>
          <h2>Ranking geral</h2>
          <p class="panel-text">Atualizado pelos dados globais sincronizados do Supabase.</p>
        </div>
        <span class="small-pill" id="rankSyncStatus">Sincronizando...</span>
      </div>
      <ul id="rankingList" class="ranking-list"></ul>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const STORAGE_KEYS = ['cs-dos-campeoes-local-data-v7', 'cs-dos-campeoes-local-data-v6', 'cs-dos-campeoes-local-data-v5', 'cs-dos-campeoes-local-data-v4'];
    const rankingList = document.getElementById('rankingList');
    const rankSyncStatus = document.getElementById('rankSyncStatus');
    const supabaseConfig = window.CSTEAM_SUPABASE || null;
    const supabaseClient = supabaseConfig?.client || null;

    function normalizeState(raw) {
      return {
        playersDatabase: Array.isArray(raw?.playersDatabase) ? raw.playersDatabase : [],
        ranking: raw?.ranking || {},
        history: Array.isArray(raw?.history) ? raw.history : []
      };
    }

    function hasData(raw) {
      return !!(raw && (raw.playersDatabase?.length || raw.history?.length || Object.keys(raw.ranking || {}).length));
    }

    function loadLocalState() {
      for (const key of STORAGE_KEYS) {
        try {
          const parsed = JSON.parse(localStorage.getItem(key));
          if (hasData(parsed)) return normalizeState(parsed);
        } catch {}
      }
      return normalizeState(null);
    }

    async function loadState() {
      if (!supabaseClient) return loadLocalState();
      const { data, error } = await supabaseClient
        .from(supabaseConfig.stateTable)
        .select('payload')
        .eq('id', supabaseConfig.stateRowId)
        .maybeSingle();

      if (error) {
        console.error('Falha ao carregar ranking global.', error);
        return loadLocalState();
      }

      const state = normalizeState(data?.payload || null);
      localStorage.setItem(STORAGE_KEYS[0], JSON.stringify(state));
      return state;
    }

    function getTierLabel(points) {
      if (points >= 10000) return 'Global Elite';
      if (points >= 8000) return 'Supreme';
      if (points >= 6500) return 'Legendary Eagle';
      if (points >= 5000) return 'DMG';
      if (points >= 3500) return 'Master Guardian';
      if (points >= 2200) return 'Gold Nova';
      return 'Silver';
    }

    function normalizeSkill(skill) {
      const parsed = Number(skill);
      if (!Number.isFinite(parsed) || parsed < 0) return 0;
      return Math.round(parsed);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getPlayerMap(playersDatabase) {
      const map = {};
      (playersDatabase || []).forEach((entry) => {
        if (typeof entry === 'string') {
          map[entry] = { skill: 0, avatar: 'logo.png', steamUrl: '' };
          return;
        }
        if (entry?.name) {
          map[entry.name] = {
            skill: normalizeSkill(entry.skill),
            avatar: entry.avatar || 'logo.png',
            steamUrl: entry.steamUrl || ''
          };
        }
      });
      return map;
    }

    async function renderRanking() {
      const state = await loadState();
      const playerMap = getPlayerMap(state.playersDatabase);
      const databaseNames = (state.playersDatabase || []).map((entry) => typeof entry === 'string' ? entry : entry?.name).filter(Boolean);
      const allNames = new Set([...databaseNames, ...Object.keys(state.ranking || {})]);
      const entries = [...allNames]
        .map((name) => [name, state.ranking?.[name] || { points: 0, wins: 0, losses: 0, matches: 0 }])
        .sort((a, b) => {
          if (b[1].points !== a[1].points) return b[1].points - a[1].points;
          if (b[1].wins !== a[1].wins) return b[1].wins - a[1].wins;
          return a[0].localeCompare(b[0]);
        });

      if (!entries.length) {
        rankingList.innerHTML = '<li class="empty-state">Ainda não existe ranking salvo.</li>';
        rankSyncStatus.textContent = 'Sem dados';
        return;
      }

      rankingList.innerHTML = '';
      entries.forEach(([name, data], index) => {
        const pointsClass = data.points >= 0 ? 'rank-points positive' : 'rank-points negative';
        const playerInfo = playerMap[name] || { skill: 0, avatar: 'logo.png', steamUrl: '' };
        const avatar = playerInfo.avatar || 'logo.png';
        const item = document.createElement('li');
        item.className = 'ranking-item ranking-item-rich';
        item.innerHTML = `
          <div class="rank-emblem"><span>#${index + 1}</span></div>
          <div class="rank-player-block">
            <img class="rank-avatar" src="${escapeHtml(avatar)}" alt="${escapeHtml(name)}">
            <div class="rank-player-meta">
              <strong class="rank-name">${escapeHtml(name)}</strong>
              <div class="rank-tier">${getTierLabel(data.points)} · ${data.wins}V / ${data.losses}D</div>
            </div>
          </div>
          <div class="rank-right">
            <div class="${pointsClass}">${data.points}</div>
            <div class="rank-meta">${data.matches} partidas</div>
          </div>
        `;
        rankingList.appendChild(item);
      });

      rankSyncStatus.textContent = `Atualizado ${new Date().toLocaleTimeString('pt-BR')}`;
    }

    renderRanking();
    setInterval(renderRanking, 2500);
  </script>
</body>
</html>
