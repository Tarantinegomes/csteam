<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking dos Campeões</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="cs-video-shell">
    <video class="cs-bg-video" autoplay muted loop playsinline>
      <source src="cs2_header.webm" type="video/webm">
    </video>
    <div class="bg-overlay"></div>
  </div>

  <div class="app-shell app-shell-compact">
    <header class="top-nav glass compact-top-nav">
      <div class="brand-lockup compact-brand">
        <div class="brand-mark logo-mark"><img src="logo.png" alt="CS dos Campeões" class="brand-logo-image"></div>
        <div class="brand-texts">
          <strong class="brand-title">Ranking</strong>
          <span class="brand-subtitle">Pontuação local da galera</span>
        </div>
      </div>
      <div class="top-nav-actions compact-nav-actions">
        <a class="nav-link" href="index.html">Voltar</a>
      </div>
    </header>

    <section class="panel glass compact-panel">
      <div class="panel-header compact-panel-header">
        <div>
          <h2>Ranking geral</h2>
          <p class="panel-text">Atualizado pelos dados salvos neste navegador.</p>
        </div>
        <span class="small-pill" id="rankSyncStatus">Sincronizando...</span>
      </div>
      <ul id="rankingList" class="ranking-list"></ul>
    </section>
  </div>

  <script>
    const STORAGE_KEYS = ['cs-dos-campeoes-local-data-v6', 'cs-dos-campeoes-local-data-v5', 'cs-dos-campeoes-local-data-v4'];
    const rankingList = document.getElementById('rankingList');
    const rankSyncStatus = document.getElementById('rankSyncStatus');

    function loadState() {
      for (const key of STORAGE_KEYS) {
        try {
          const parsed = JSON.parse(localStorage.getItem(key));
          const hasData = parsed && (parsed.playersDatabase?.length || parsed.history?.length || Object.keys(parsed.ranking || {}).length);
          if (hasData) return parsed;
        } catch {}
      }
      return { playersDatabase: [], ranking: {} };
    }

    function getTierLabel(points) {
      if (points >= 5000) return 'Global Elite';
      if (points >= 3500) return 'Supremo';
      if (points >= 2500) return 'Águia Lendária';
      if (points >= 1500) return 'AK Brabíssimo';
      if (points >= 500) return 'Guardião Mestre';
      return 'Gold Nova';
    }

    function normalizeSkill(skill) {
      const parsed = Number(skill);
      if (!Number.isFinite(parsed) || parsed < 0) return 0;
      return Math.round(parsed);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getPlayerMap(playersDatabase) {
      const map = {};
      (playersDatabase || []).forEach((entry) => {
        if (typeof entry === 'string') {
          map[entry] = { skill: 0, avatar: 'logo.png' };
          return;
        }
        if (entry?.name) {
          map[entry.name] = {
            skill: normalizeSkill(entry.skill),
            avatar: entry.avatar || 'logo.png'
          };
        }
      });
      return map;
    }

    function renderRanking() {
      const state = loadState();
      const playerMap = getPlayerMap(state.playersDatabase);
      const entries = Object.entries(state.ranking || {})
        .sort((a, b) => {
          if (b[1].points !== a[1].points) return b[1].points - a[1].points;
          if (b[1].wins !== a[1].wins) return b[1].wins - a[1].wins;
          return a[0].localeCompare(b[0]);
        });

      if (!entries.length) {
        rankingList.innerHTML = '<li class="empty-state">Ainda não existe ranking salvo.</li>';
        rankSyncStatus.textContent = 'Sem dados';
        return;
      }

      rankingList.innerHTML = '';
      entries.forEach(([name, data], index) => {
        const pointsClass = data.points >= 0 ? 'rank-points positive' : 'rank-points negative';
        const playerInfo = playerMap[name] || { skill: 0, avatar: 'logo.png' };
        const item = document.createElement('li');
        item.className = 'ranking-item';
        item.innerHTML = `
          <div class="rank-emblem"><span>#${index + 1}</span></div>
          <div class="db-player-main">
            <img class="player-avatar" src="${escapeHtml(playerInfo.avatar)}" alt="${escapeHtml(name)}">
            <div class="db-player-meta">
              <strong class="rank-name">${escapeHtml(name)}</strong>
              <div class="rank-meta">${data.wins}V • ${data.losses}D • ${data.matches} partidas • ${playerInfo.skill.toLocaleString('pt-BR')} CS</div>
            </div>
          </div>
          <div class="rank-right">
            <div class="${pointsClass}">${data.points > 0 ? '+' : ''}${data.points}</div>
            <div class="rank-tier">${getTierLabel(data.points)}</div>
          </div>
        `;
        rankingList.appendChild(item);
      });

      rankSyncStatus.textContent = `Atualizado ${new Date().toLocaleTimeString('pt-BR')}`;
    }

    renderRanking();
    window.addEventListener('storage', renderRanking);
    setInterval(renderRanking, 1500);
  </script>
</body>
</html>
